name: crypticip
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy>=1.24
  - scipy>=1.10
  - pandas>=2.0
  - matplotlib>=3.7
  - biopython>=1.80
  - requests>=2.28
  - pyyaml>=6.0
  - tqdm>=4.65
  - pytest>=7.0
  # External structural-biology tools (bioconda); may not be available on all OSes
  - fpocket=3.1
  - freesasa>=2.1
  - apbs>=3.4
  - pdb2pqr>=3.6
  - pip:
      - -e .
