# Alternative scoring schemes. Selected via `--scoring <name>` in the CLI.

default:
  weights:
    depth:      0.25
    inv_sasa:   0.25
    elec:       0.20
    basic:      0.20
    volume_fit: 0.10
  plddt_penalty: {enabled: true, threshold: 70.0, penalty: 0.2}

depth_heavy:
